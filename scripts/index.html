<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bollywood Cinema Lens</title>
  </head>
  <body>
    <script>
      window['ai_edge_gallery_get_result'] = async (data) => {
        if (data) {
          // Store the data in localStorage so webview.html can access it
          localStorage.setItem('bollywood_skill_data', data);
        } else {
          localStorage.removeItem('bollywood_skill_data');
        }

        return JSON.stringify({
          webview: {
            url: `../assets/webview.html`
          }
        });
      };
    </script>
  </body>
</html>
