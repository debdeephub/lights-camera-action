<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bollywood Camera Filter</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            color: #ffd700;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #stage {
            position: relative;
            width: 90vw;
            height: 60vh;
            border: 5px solid #ffd700;
            box-shadow: 0 0 20px #ff4500;
            display: none;
        }

        #live-camera, #output-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Bollywood Filter: High Saturation, Warmth, and Contrast */
            filter: saturate(1.8) sepia(0.2) contrast(1.1) brightness(1.1);
        }

        #output-image {
            display: none;
        }

        .overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px #000;
            border-left: 4px solid #ff4500;
            padding-left: 10px;
            pointer-events: none;
        }

        #capture-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, #ff4500, #ffd700);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            z-index: 10;
        }

        #capture-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div id="stage">
        <video id="live-camera" autoplay playsinline></video>
        <img id="output-image" src="" />
        <div class="overlay" id="caption">Blockbuster Style</div>
        <button id="capture-btn">Capture</button>
        <canvas id="capture-canvas" style="display:none;"></canvas>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const video = document.getElementById('live-camera');
        const imgElement = document.getElementById('output-image');
        const captureBtn = document.getElementById('capture-btn');
        const canvas = document.getElementById('capture-canvas');

        let stream = null;

        async function startCamera() {
            try {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    video.srcObject = stream;
                    stage.style.display = 'block';
                    video.style.display = 'block';
                    imgElement.style.display = 'none';
                    captureBtn.style.display = 'block';
                } else {
                    console.error("getUserMedia not supported.");
                }
            } catch (err) {
                console.error("Error accessing camera:", err);
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        captureBtn.addEventListener('click', () => {
            if (!stream) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg');
            imgElement.src = imageData;
            
            video.style.display = 'none';
            imgElement.style.display = 'block';
            captureBtn.style.display = 'none';

            stopCamera();
            
            // Inform parent if needed
            window.parent.postMessage({
                type: 'SKILL_RESPONSE',
                payload: { 
                    message: "The scene is set! Your Bollywood masterpiece is ready.",
                    imageUri: imageData
                }
            }, '*');
        });

        // Run when webview.html loads
        window.addEventListener('DOMContentLoaded', () => {
            const rawData = localStorage.getItem('bollywood_skill_data');
            let imgData = null;
            
            if (rawData) {
                try {
                    const parsedData = JSON.parse(rawData);
                    // Check if native app provided an image base64 or uri
                    if (parsedData.image) {
                        imgData = parsedData.image;
                    } else if (parsedData.base64) {
                        imgData = parsedData.base64;
                    } else if (parsedData.imageUri) {
                        imgData = parsedData.imageUri;
                    }
                } catch (e) {
                    // data might just be a string or we fall back
                }
            }

            if (imgData) {
                // If we already have an image from the native app, just show it
                imgElement.src = imgData;
                stage.style.display = 'block';
                video.style.display = 'none';
                imgElement.style.display = 'block';
                captureBtn.style.display = 'none';
            } else {
                // Otherwise, start the live camera inside the webview
                startCamera();
            }
        });
    </script>
</body>

</html>
